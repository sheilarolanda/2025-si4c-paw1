<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Praktikum Bootstrap 5</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
          rel="stylesheet" 
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
          crossorigin="anonymous">
  </head>
  <body>

    <div class="container">
        <!-- container/container-fluid -->
        <h1 class="text-center text-uppercase">Toko Bahagia</h1>

        <!-- navbar -->
        <ul class="nav justify-content-center">
            <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">Active</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">Link</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">Link</a>
            </li>        
            <li class="nav-item">
                <a class="nav-link disabled" aria-disabled="true">Disabled</a>
            </li>
        </ul>


        <!-- carousel -->
        <div id="carouselExample" class="carousel slide">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="images/download.jpg" class="d-block w-100" alt="...">
                </div>
                <div class="carousel-item">
                    <img src="images/download (1).jpg" class="d-block w-100" alt="...">
                </div>
                <div class="carousel-item">
                    <img src="images/download (2).jpg" class="d-block w-100" alt="...">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>


        <!-- row 1 -->
        <div class="row mt-3">
            <div class="col"><img src="images/download (3).jpg" alt="" class="img-fluid"></div>
            <div class="col"><img src="images/download (4).jpg" alt="" class="img-fluid rounded"></div>
            <div class="col"><img src="images/download (5).jpg" alt="" class="img-fluid rounded"></div>
        </div>

        <!-- row 2 -->
        <div class="row at-4">
            <div class="col-lg-3 col-md-6"><img src="images/download (4).jpg" alt="" class="img-fluid rounded"></div>
            <div class="col-lg-3 col-md-6"><img src="images/download (4).jpg" alt="" class="img-fluid rounded"></div>
            <div class="col-lg-3 col-md-6"><img src="images/download (4).jpg" alt="" class="img-fluid rounded"></div>
            <div class="col-lg-3 col-md-6"><img src="images/download (4).jpg" alt="" class="img-fluid rounded"></div>
        </div>

        <!-- row 3 -->
        <div class="row mt-4 g-3">
            <div class="col-lg-6 col-md-12"><img src="images/download (2).jpg" alt="" class="img-fluid rounded" width="100%"></div>
            <div class="col-lg-3 col-md-6"><img src="images/download (2).jpg" alt="" class="img-fluid rounded"></div>
            <div class="col-lg-3 col-md-6"><img src="images/download (1).jpg" alt="" class="img-fluid rounded"></div>
        </div>
    </div>
    <!-- bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
